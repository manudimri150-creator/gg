name: Deploy to Oxygen

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy to Shopify Oxygen
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      # NOTE: This step requires package.json and package-lock.json to exist in the repository.
      # If you are deploying a static site or custom worker, you must have your dependencies configured.
      - name: Install dependencies
        run: npm ci

      # Deploys the project to Shopify Oxygen using the storefront deployment token
      - name: Build and Deploy to Oxygen
        run: npx shopify hydrogen deploy
        env:
          SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN: ${{ secrets.OXYGEN_DEPLOYMENT_TOKEN }}
